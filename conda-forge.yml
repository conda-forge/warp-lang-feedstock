      CONDA_BLD_PATH: C:\\bld\\
      MINIFORGE_HOME: C:\\Miniforge
      SET_PAGEFILE: 'True'
bot:
  inspection: update-grayskull
build_platform:
  linux_aarch64: linux_64
  osx_arm64: osx_64
